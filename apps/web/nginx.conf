gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

# CSP value shared across all HTML-serving location blocks.
# Notes:
#   script-src 'self'         — Vite bundles hashed JS files, no inline scripts needed.
#   style-src 'unsafe-inline' — React style={} props produce style="..." attributes.
#   img-src https:            — avatar and media URLs are stored as https:// links.
#   connect-src ws: wss:      — Socket.IO WebSocket connections proxied through nginx.
#   frame-ancestors 'none'    — belt-and-suspenders with X-Frame-Options.
map $uri $csp_policy {
  default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; object-src 'none'; base-uri 'self';";
}

# ─── HTTPS SETUP ───────────────────────────────────────────────────────────────
# To enable HTTPS with Let's Encrypt:
#
#   1. On the host, run:
#        certbot certonly --standalone -d yourdomain.com
#      This creates /etc/letsencrypt/live/yourdomain.com/{fullchain,privkey}.pem
#
#   2. In docker-compose.prod.yml uncomment the cert volume mounts and port 443.
#
#   3. In this file:
#      a) Uncomment the HTTP redirect server block below.
#      b) In the main server block, change "listen 80;" to "listen 443 ssl;" and
#         uncomment all lines starting with "# ssl_".
#      c) Uncomment the HSTS add_header lines in the location blocks.
# ───────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect (uncomment when SSL certs are in place)
# server {
#   listen 80;
#   server_name _;
#   return 301 https://$host$request_uri;
# }

server {
  listen 80;
  # listen 443 ssl;

  # ssl_certificate     /etc/ssl/certs/fullchain.pem;
  # ssl_certificate_key /etc/ssl/private/privkey.pem;
  # ssl_protocols       TLSv1.2 TLSv1.3;
  # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  # ssl_prefer_server_ciphers off;
  # ssl_session_cache   shared:SSL:10m;
  # ssl_session_timeout 1d;
  # ssl_session_tickets off;

  root /usr/share/nginx/html;
  index index.html;

  # Static assets — Vite appends content hashes, so 1-year cache is safe.
  # nginx: add_header in a location block overrides server-level add_header,
  # so all security headers must be repeated in each block that sets its own.
  location ~* \.(js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
    expires 1y;
    add_header Cache-Control           "public, immutable"                        always;
    add_header X-Content-Type-Options  "nosniff"                                  always;
    add_header X-Frame-Options         "SAMEORIGIN"                               always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"          always;
    add_header Content-Security-Policy $csp_policy                                always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    access_log off;
  }

  # SPA fallback — all unknown paths serve index.html.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control           "no-cache"                                 always;
    add_header X-Content-Type-Options  "nosniff"                                  always;
    add_header X-Frame-Options         "SAMEORIGIN"                               always;
    add_header X-XSS-Protection        "1; mode=block"                            always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"          always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy $csp_policy                                always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  }

  # Proxy API calls to API container
  location /api/ {
    proxy_pass         http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  # WebSocket proxy for Socket.IO realtime
  location /socket.io/ {
    proxy_pass         http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_read_timeout 86400s;
  }
}
