gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

# Reusable CSP for HTML responses (index.html).
# Notes:
#   script-src 'self'         — Vite bundles hashed JS files loaded from same origin; no inline scripts needed.
#   style-src 'unsafe-inline' — React inline style={} props generate style="..." attributes in the DOM.
#   img-src https:            — avatar and media URLs stored as https:// links.
#   connect-src ws: wss:      — Socket.IO WebSocket connections proxied through this nginx.
#   frame-ancestors 'none'    — belt-and-suspenders alongside X-Frame-Options.
map $uri $csp_policy {
  default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; object-src 'none'; base-uri 'self';";
}

server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Static assets — Vite appends content hashes so 1-year cache is safe.
  # nginx: add_header in a location block overrides server-level add_header,
  # so all security headers must be repeated here.
  location ~* \.(js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
    expires 1y;
    add_header Cache-Control              "public, immutable"                           always;
    add_header X-Content-Type-Options     "nosniff"                                     always;
    add_header X-Frame-Options            "SAMEORIGIN"                                  always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
    add_header Content-Security-Policy    $csp_policy                                   always;
    access_log off;
  }

  # SPA fallback — all unknown paths serve index.html.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control              "no-cache"                                    always;
    add_header X-Content-Type-Options     "nosniff"                                     always;
    add_header X-Frame-Options            "SAMEORIGIN"                                  always;
    add_header X-XSS-Protection           "1; mode=block"                               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"    always;
    add_header Content-Security-Policy    $csp_policy                                   always;
    # Uncomment after confirming HTTPS works end-to-end:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"        always;
  }

  # Proxy API calls to API container
  location /api/ {
    proxy_pass         http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  # WebSocket proxy for Socket.IO realtime
  location /socket.io/ {
    proxy_pass         http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_read_timeout 86400s;
  }
}
