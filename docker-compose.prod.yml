services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bethflow}
      POSTGRES_USER: ${POSTGRES_USER:-bethflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No ports: DB is internal-only, not exposed to the host
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-bethflow}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    # requirepass set from env so the password is never hardcoded in this file
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    # No ports: Redis is internal-only, not exposed to the host
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .                        # monorepo root — Dockerfile references packages/shared
      dockerfile: apps/api/Dockerfile
      target: production
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.production
    environment:
      # Override REDIS_URL to inject the password from env — .env.production sets the base URL
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
    # API is internal — nginx proxies /api/* to it. No direct host exposure needed.
    # expose: ["4000"]

  web:
    build:
      context: .                        # monorepo root — Dockerfile references packages/shared
      dockerfile: apps/web/Dockerfile
      target: production
    restart: always
    depends_on:
      - api
    ports:
      - '80:80'
      # Uncomment after adding SSL cert mount:
      # - '443:443'

volumes:
  postgres_data:
  redis_data:
