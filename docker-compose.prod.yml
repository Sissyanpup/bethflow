services:
  postgres:
    image: postgres:16-alpine
    restart: always
    env_file: .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No ports: DB is internal-only, not exposed to the host
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-bethflow}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    env_file: .env.production
    # Use $$REDIS_PASSWORD (double-dollar) so Docker evaluates it at container runtime
    # from the env_file above — not at compose parse time (which has no access to .env.production).
    command: sh -c "redis-server --requirepass $$REDIS_PASSWORD --save 60 1 --loglevel warning"
    volumes:
      - redis_data:/data
    # No ports: Redis is internal-only, not exposed to the host
    healthcheck:
      test: ['CMD', 'sh', '-c', 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .                        # monorepo root — Dockerfile references packages/shared
      dockerfile: apps/api/Dockerfile
      target: production
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.production
    # API is internal — nginx proxies /api/* to it. No direct host exposure needed.
    # expose: ["4000"]

  web:
    build:
      context: .                        # monorepo root — Dockerfile references packages/shared
      dockerfile: apps/web/Dockerfile
      target: production
    restart: always
    depends_on:
      - api
    ports:
      - '80:80'
      - '443:443'
    # SSL certificate volumes — uncomment and set paths after running certbot:
    #   certbot certonly --standalone -d yourdomain.com
    # volumes:
    #   - /etc/letsencrypt/live/yourdomain.com/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
    #   - /etc/letsencrypt/live/yourdomain.com/privkey.pem:/etc/ssl/private/privkey.pem:ro

volumes:
  postgres_data:
  redis_data:
