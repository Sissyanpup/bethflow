services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bethflow
      POSTGRES_USER: bethflow
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bethflow']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    ports:
      - '4000:4000'
    volumes:
      - .:/workspace
      - api_node_modules:/workspace/node_modules
      - api_app_node_modules:/workspace/apps/api/node_modules
    working_dir: /workspace/apps/api
    command: npm run dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '5173:5173'
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/node_modules
      - web_app_node_modules:/workspace/apps/web/node_modules
    working_dir: /workspace/apps/web
    command: npm run dev

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env
    environment:
      - API_BASE_URL=http://api:4000
    volumes:
      - .:/workspace
      - bot_node_modules:/workspace/apps/bot/node_modules
      - bot_data:/workspace/apps/bot/data
    working_dir: /workspace/apps/bot
    command: npm run dev

volumes:
  postgres_data:
  api_node_modules:
  api_app_node_modules:
  web_node_modules:
  web_app_node_modules:
  bot_node_modules:
  bot_data:
